version: '3.8'
services:
  smartbrief:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/smartbrief.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-smartbrief-secret}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
